<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic-Tac-Toe</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Tic-Tac-Toe</h1>
        <h2 class="nRound">Round</h2>
    </div>
    <div class="game">
        <div class="player1">
            <h2>Player 1</h2>
            <p>Symbol : O</p>
            <p class="p1score">Score : 0</p>
        </div>
        <div class="board">
            <div class="cell" id="c0"></div>
            <div class="cell" id="c1"></div>
            <div class="cell" id="c2"></div>
            <div class="cell" id="c3"></div>
            <div class="cell" id="c4"></div>
            <div class="cell" id="c5"></div>
            <div class="cell" id="c6"></div>
            <div class="cell" id="c7"></div>
            <div class="cell" id="c8"></div>
        </div>
        <div class="player2">
            <h2>Player 2</h2>
            <p>Symbol : X</p>
            <p class="p2score">Score : 0</p>
        </div>
    </div>
</div>

</body>
</html>
